name: Update Dealers List

# Lives in the backend repo (e-fficient-finance-widget). Whenever
# dealers.config.js changes on main, regenerates dealers.json in the
# e-fficient-ui repo so "Sync Template to Dealer" always has an up-to-date
# list without anyone hand-maintaining two files in two repos. dealers.json
# stays the single thing that workflow reads — this is just what keeps it
# accurate — so a backend-repo access problem here only affects this
# occasional update, never blocks the actual per-push dealer sync.

on:
  push:
    branches: [main]
    paths:
      - '**/dealers.config.js'
  workflow_dispatch:

jobs:
  update-dealers-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (e-fficient-finance-widget)
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout e-fficient-ui
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/e-fficient-ui
          token: ${{ secrets.GH_PAT }}
          path: template

      - name: Regenerate dealers.json from dealers.config.js
        id: generate
        run: |
          set -e

          CONFIG_FILE=$(find backend -iname "dealers.config.js" | head -1)
          if [ -z "$CONFIG_FILE" ]; then
            echo "❌ dealers.config.js not found in this repo. Diagnostics:"
            echo "── github.ref / event ──"
            echo "ref: ${{ github.ref }}"
            echo "event: ${{ github.event_name }}"
            echo "── backend/ top-level contents ──"
            ls -la backend
            echo "── backend/workers/ contents (if it exists) ──"
            ls -la backend/workers 2>&1 || echo "backend/workers does not exist"
            echo "── backend/workers/dealers/ contents (if it exists) ──"
            ls -la backend/workers/dealers 2>&1 || echo "backend/workers/dealers does not exist"
            echo "── full recursive listing of backend/ (first 200 lines) ──"
            find backend -type f | head -200
            exit 1
          fi
          echo "Found config at: $CONFIG_FILE"

          # Extract top-level dealer keys — lines shaped like:
          #   '<dealer-key>': {
          # (2-space indented, single-quoted key, colon, opening brace).
          # Regex-based rather than executing the file, since it's an ESM
          # module and module resolution inside a bare `node -e` isn't
          # guaranteed to work without knowing this repo's package.json
          # "type" setting.
          KEYS=$(grep -oP "^\s{2}'\K[a-z0-9-]+(?='\s*:\s*\{)" "$CONFIG_FILE")

          if [ -z "$KEYS" ]; then
            echo "❌ No dealer keys matched — the file's format may have changed. Check the regex against its current structure."
            exit 1
          fi

          REPOS="[]"
          while IFS= read -r key; do
            # "findndrive" is the fallback/default config served by the base
            # e-fficient-ui deployment itself, not a separately onboarded
            # dealer with its own repo — exclude it. Adjust here if that
            # assumption ever changes.
            if [ "$key" = "findndrive" ]; then
              echo "Skipping '$key' — fallback/default config, no separate repo."
              continue
            fi
            REPOS=$(echo "$REPOS" | jq -c --arg repo "e-fficient-ui-$key" '. + [$repo]')
          done <<< "$KEYS"

          COUNT=$(echo "$REPOS" | jq 'length')
          echo "Found $COUNT dealer repo(s): $(echo "$REPOS" | jq -r 'join(", ")')"

          echo "$REPOS" | jq . > template/dealers.json

      - name: Check for changes
        id: changes
        run: |
          cd template
          git diff --quiet dealers.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push dealers.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd template
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dealers.json
          git commit -m "chore: update dealers.json from dealers.config.js"

          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "✅ Pushed successfully (attempt $attempt)."
                break
              fi
            else
              echo "❌ Rebase produced a real conflict — needs manual resolution."
              git rebase --abort
              exit 1
            fi

            if [ "$attempt" = "3" ]; then
              echo "❌ Push still failing after 3 attempts — giving up."
              exit 1
            fi
            echo "⚠️  Push rejected (attempt $attempt), retrying after rebase..."
            sleep 3
          done

      - name: Report outcome
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "✅ dealers.json updated in e-fficient-ui."
          else
            echo "ℹ️  dealers.json already up to date — no changes."
          fi

