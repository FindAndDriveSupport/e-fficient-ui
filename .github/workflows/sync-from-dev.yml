name: Sync from Dev (scheduled)

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: template

      - uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/e-fficient-ui-dev
          token: ${{ secrets.GH_PAT }}
          path: dev

      - run: |
          rsync -av --delete \
            --exclude='.git/' --exclude='node_modules/' \
            --exclude='.env' --exclude='wrangler.toml' \
            --exclude='src/config/dealerConfig.ts' \
            --exclude='src/contexts/DealerContext.tsx' \
            --exclude='src/routes/index.tsx' \
            --exclude='.github/' \
            dev/ template/

      - run: |
          cd template
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
        id: changes

      - if: steps.changes.outputs.changed == 'true'
        run: |
          cd template
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: scheduled sync from e-fficient-ui-dev"
          git push