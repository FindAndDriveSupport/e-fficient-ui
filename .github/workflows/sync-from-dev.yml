name: Sync from Dev

on:
  repository_dispatch:
    types: [sync-from-dev]
  workflow_dispatch:

# Only one run of this workflow at a time. If a second trigger arrives while
# one is already in progress (e.g. a manual re-run, or two pushes to
# e-fficient-ui-dev in quick succession), it queues behind the current run
# instead of checking out in parallel and racing it for the push to main —
# which is what was causing the repeated
# "! [rejected] main -> main (fetch first)" failures.
concurrency:
  group: sync-from-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout template repo (e-fficient-ui)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: template

      - name: Checkout dev repo (e-fficient-ui-dev)
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/e-fficient-ui-dev
          token: ${{ secrets.GH_PAT }}
          path: dev

      - name: Sync files from dev to template
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='wrangler.toml' \
            --exclude='src/config/dealerConfig.ts' \
            --exclude='src/routes/index.tsx' \
            --exclude='.github/' \
            dev/ template/

      - name: Check for changes
        id: changes
        run: |
          cd template
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd template
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync latest changes from e-fficient-ui-dev"

          # Rebase onto the latest remote main before pushing, with a few
          # retries — kept as a backstop even with concurrency control above,
          # since a manual push from a person (not this workflow) could still
          # land on main between checkout and push.
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "✅ Pushed successfully (attempt $attempt)."
                break
              fi
            else
              echo "❌ Rebase produced a real conflict — needs manual resolution, not just a race condition."
              git rebase --abort
              exit 1
            fi

            if [ "$attempt" = "3" ]; then
              echo "❌ Push still failing after 3 attempts — giving up."
              exit 1
            fi
            echo "⚠️  Push rejected (attempt $attempt), retrying after rebase..."
            sleep 3
          done

