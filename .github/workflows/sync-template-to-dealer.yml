name: Sync Template to Dealer

on:
  # Auto-sync to EVERY dealer repo whenever the template's main branch changes.
  push:
    branches: [main]

  # Manual trigger — leave dealer_repo blank (or set to "all") to sync every
  # dealer repo, or provide a specific repo name to sync just that one.
  workflow_dispatch:
    inputs:
      dealer_repo:
        description: 'Dealer repo to sync (e.g. e-fficient-ui-keitzman-finance). Leave blank or "all" to sync every dealer repo.'
        required: false
        default: 'all'

  # Unchanged — still supports syncing a single dealer on demand from
  # elsewhere (e.g. right after onboarding a new dealer).
  repository_dispatch:
    types: [sync-to-dealer]

jobs:
  # ── Discover which dealer repo(s) to sync ──────────────────────────────────
  # Discovery no longer calls the GitHub org API (orgs/{org}/repos), which
  # requires read:org scope + SSO/org-token approval that classic PATs need
  # separate authorisation for — this was the source of the 404s. Instead,
  # dealer keys are read directly from dealers.config.js in the backend repo
  # (e-fficient-finance-widget) — the actual single source of truth for
  # which dealers exist — rather than maintaining a second, separate list
  # that could drift out of sync with it.
  #
  # ASSUMPTIONS (confirm/adjust if either is wrong):
  #   1. Each dealer's UI repo is named `e-fficient-ui-<dealerKey>`, e.g.
  #      the "keitzman-finance" entry in dealers.config.js maps to repo
  #      e-fficient-ui-keitzman-finance.
  #   2. The "findndrive" key is the fallback/default config served by the
  #      base e-fficient-ui deployment itself, not a separately onboarded
  #      dealer with its own repo — so it's excluded from the sync list.
  discover-dealers:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
    steps:
      - name: Determine target repo list (single-repo path)
        id: single
        run: |
          SINGLE_REPO=""
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SINGLE_REPO="${{ github.event.client_payload.dealer_repo }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ -n "${{ github.event.inputs.dealer_repo }}" ] && \
               [ "${{ github.event.inputs.dealer_repo }}" != "all" ]; then
            SINGLE_REPO="${{ github.event.inputs.dealer_repo }}"
          fi
          echo "repo=$SINGLE_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo (e-fficient-finance-widget)
        if: steps.single.outputs.repo == ''
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/e-fficient-finance-widget
          token: ${{ secrets.GH_PAT }}
          path: backend

      - name: Discover dealer keys from dealers.config.js
        id: discover
        run: |
          set -e

          if [ -n "${{ steps.single.outputs.repo }}" ]; then
            echo "Syncing single dealer repo: ${{ steps.single.outputs.repo }}"
            echo "repos=[\"${{ steps.single.outputs.repo }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONFIG_FILE=$(find backend -name "dealers.config.js" | head -1)
          if [ -z "$CONFIG_FILE" ]; then
            echo "❌ dealers.config.js not found anywhere in e-fficient-finance-widget."
            exit 1
          fi
          echo "Found config at: $CONFIG_FILE"

          # Extract top-level dealer keys — lines shaped like:
          #   '<dealer-key>': {
          # (2-space indented, single-quoted key, colon, opening brace).
          # Regex-based rather than executing the file, since it's an ESM
          # module (export const DEALERS = {...}) and module resolution
          # inside a bare `node -e` isn't guaranteed to work without knowing
          # this repo's package.json "type" setting.
          KEYS=$(grep -oP "^\s{2}'\K[a-z0-9-]+(?='\s*:\s*\{)" "$CONFIG_FILE")

          if [ -z "$KEYS" ]; then
            echo "❌ No dealer keys matched in $CONFIG_FILE — the file's format may have changed. Check the regex against its current structure."
            exit 1
          fi

          REPOS="[]"
          while IFS= read -r key; do
            if [ "$key" = "findndrive" ]; then
              echo "Skipping '$key' — fallback/default config, no separate repo."
              continue
            fi
            REPOS=$(echo "$REPOS" | jq -c --arg repo "e-fficient-ui-$key" '. + [$repo]')
          done <<< "$KEYS"

          COUNT=$(echo "$REPOS" | jq 'length')
          echo "Found $COUNT dealer repo(s): $(echo "$REPOS" | jq -r 'join(", ")')"

          echo "repos=$REPOS" >> "$GITHUB_OUTPUT"

  # ── Sync template → each discovered dealer repo, in parallel ───────────────
  sync:
    needs: discover-dealers
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel remaining dealers if one fails — a bad sync to one
      # dealer shouldn't block the rest from getting the update.
      fail-fast: false
      matrix:
        dealer_repo: ${{ fromJson(needs.discover-dealers.outputs.repos) }}

    steps:
      - name: Checkout template repo (e-fficient-ui)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: template

      - name: Checkout dealer repo
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/${{ matrix.dealer_repo }}
          token: ${{ secrets.GH_PAT }}
          path: dealer

      - name: Build exclude list
        id: excludes
        run: |
          # Base excludes — apply to every dealer, always.
          cat > excludes.txt <<'EOF'
          .git/
          node_modules/
          .env
          wrangler.toml
          src/config/dealerConfig.ts
          src/contexts/DealerContext.tsx
          src/routes/index.tsx
          .github/
          EOF

          # Dealer-specific excludes — optional. If this dealer's own repo
          # has a .syncignore file (one path per line, same syntax as the
          # base list above), append it so this sync also skips those paths
          # for THIS dealer only. Used for one-off file customizations that
          # a boolean flag in dealerConfig.ts can't express — see the base
          # excludes for the general "shared code + flag" pattern, which
          # should be preferred whenever it fits.
          if [ -f "dealer/.syncignore" ]; then
            echo "Found dealer/.syncignore — merging dealer-specific excludes:"
            cat dealer/.syncignore
            echo "" >> excludes.txt
            cat dealer/.syncignore >> excludes.txt
          else
            echo "No dealer/.syncignore for ${{ matrix.dealer_repo }} — using base excludes only."
          fi

      - name: Sync files from template to dealer
        run: |
          rsync -av --exclude-from=excludes.txt template/ dealer/

      - name: Check for changes
        id: changes
        run: |
          cd dealer
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd dealer
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync latest changes from e-fficient-ui template"
          git push

      - name: Report sync outcome
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "✅ ${{ matrix.dealer_repo }} — synced and pushed."
          else
            echo "ℹ️  ${{ matrix.dealer_repo }} — no changes, nothing to push."
          fi

