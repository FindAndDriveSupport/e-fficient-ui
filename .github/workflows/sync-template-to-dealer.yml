name: Sync Template to Dealer

on:
  workflow_dispatch:
    inputs:
      dealer_repo:
        description: 'Dealer repo name to sync (e.g. e-fficient-ui-keitzman-finance) — leave blank to sync all listed below'
        required: false
  repository_dispatch:
    types: [sync-to-dealer]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dealer: [e-fficient-ui-keitzman-finance, e-fficient-ui-north-western-motors]
      fail-fast: false

    steps:
      - name: Skip if specific dealer was requested and doesn't match
        id: skip
        run: |
          REQUESTED="${{ github.event.inputs.dealer_repo || github.event.client_payload.dealer_repo }}"
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "${{ matrix.dealer }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout template repo (e-fficient-ui)
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: template

      - name: Checkout dealer repo (${{ matrix.dealer }})
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/${{ matrix.dealer }}
          token: ${{ secrets.GH_PAT }}
          path: dealer

      - name: Sync files from template to dealer
        if: steps.skip.outputs.skip == 'false'
        run: |
          rsync -av \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='wrangler.toml' \
            --exclude='src/config/dealerConfig.ts' \
            --exclude='src/contexts/DealerContext.tsx' \
            --exclude='src/routes/index.tsx' \
            --exclude='.github/' \
            template/ dealer/

      - name: Check for changes
        if: steps.skip.outputs.skip == 'false'
        id: changes
        run: |
          cd dealer
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.skip.outputs.skip == 'false' && steps.changes.outputs.changed == 'true'
        run: |
          cd dealer
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync latest changes from e-fficient-ui template"
          git push