name: Restore Dev from Template (one-time)

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout template repo (e-fficient-ui)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: template

      - name: Checkout dev repo (e-fficient-ui-dev)
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/e-fficient-ui-dev
          token: ${{ secrets.GH_PAT }}
          path: dev

      - name: Copy template into dev
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='wrangler.toml' \
            --exclude='src/config/dealerConfig.ts' \
            --exclude='src/routes/index.tsx' \
            --exclude='.github/' \
            template/ dev/

      - name: Commit and push to dev
        run: |
          cd dev
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: restore dev from template after direct template edits" && git push)